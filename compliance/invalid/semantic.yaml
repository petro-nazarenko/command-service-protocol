# compliance/invalid/semantic.yaml
# Commands that must produce ERROR: semantic per CSS-1.0 section 6.2

- id: i-sem-01
  description: multiple arguments not allowed
  input: 'g "First idea" "Second idea"'
  expected: "ERROR: semantic: multiple arguments not allowed"

- id: i-sem-02
  description: multiple arguments with dry flag
  input: 'g "First" "Second" dry'
  expected: "ERROR: semantic: multiple arguments not allowed"

- id: i-sem-03
  description: multiple arguments reversed order
  input: 'up "Idea A" "Idea B"'
  expected: "ERROR: semantic: multiple arguments not allowed"

- id: i-sem-04
  description: argument cannot be combined with note=
  input: 'g "My idea" note="My note"'
  expected: "ERROR: semantic: argument cannot be combined with note="

- id: i-sem-05
  description: only-version and no-version cannot be used together
  input: "g only-version no-version"
  expected: "ERROR: semantic: only-version and no-version cannot be used together"

- id: i-sem-06
  description: only-status and no-status cannot be used together
  input: "g only-status no-status"
  expected: "ERROR: semantic: only-status and no-status cannot be used together"

