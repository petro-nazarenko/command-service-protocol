# .github/workflows/compliance.yml
# Run compliance certification suite independently
# Can be triggered manually or on schedule

name: Compliance Certification

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

jobs:
  certify:
    name: CSS-1.0 Compliance Certification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install pytest pyyaml
          pip install -e .

      - name: Run compliance suite
        run: |
          pytest tests/test_compliance.py -v --tb=long \
            --junitxml=compliance-report.xml

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.xml

      - name: Print summary
        run: |
          echo "CSS-1.0 Compliance Certification complete"
          echo "Repository: github.com/petro-nazarenko/command-service-protocol"
          echo "Spec: CSS-1.0"
          echo "Date: $(date -u +%Y-%m-%d)"
